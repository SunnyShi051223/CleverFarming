  <script>
    // 资讯数据
    const newsData = [
      {
        id: 1,
        title: '农业农村部召开全国粮油作物大面积单产提升会议',
        category: '政策解读',
        summary: '2025年中央一号文件《中共中央 国务院关于做好2025年全面推进乡村振兴重点工作的意见》正式发布，这是21世纪以来第20个指导“三农”工作的中央一号文件。',
        content: `
          <p>2025年中央一号文件《中共中央 国务院关于做好2025年全面推进乡村振兴重点工作的意见》正式发布，这是21世纪以来第20个指导"三农"工作的中央一号文件。</p>
          
          <p>文件指出，全面建设社会主义现代化国家，最艰巨最繁重的任务仍然在农村。世界百年未有之大变局加速演进，我国发展进入战略机遇和风险挑战并存、不确定难预料因素增多的时期，守好"三农"基本盘至关重要、不容有失。</p>
          
          <p>文件强调，要坚决守牢确保粮食安全、防止规模性返贫等底线，扎实推进乡村发展、乡村建设、乡村治理等重点工作，加快建设农业强国，建设宜居宜业和美乡村。</p>
          
          <p>文件部署了2025年全面推进乡村振兴的重点工作，包括抓紧抓好粮食和重要农产品稳产保供、加强农业基础设施建设、强化农业科技和装备支撑、巩固拓展脱贫攻坚成果、推动乡村产业高质量发展、拓宽农民增收致富渠道、扎实推进宜居宜业和美乡村建设、健全党组织领导的乡村治理体系、强化政策保障和体制机制创新等九个方面。</p>
        `,
        image: 'https://www.moa.gov.cn/xw/zwdt/202509/W020250925704608104179.jpg',
        author: '农业部',
        time: '2025-02-15',
        views: 12000
      },
      {
        id: 2,
        title: '全国春耕生产形势分析及技术指导意见',
        category: '农业生产',
        summary: '当前全国春耕生产正由南向北陆续展开，总体形势较好。各地要加强技术指导，确保春耕生产顺利进行，为全年粮食丰收奠定基础。',
        content: `
          <p>当前全国春耕生产正由南向北陆续展开，总体形势较好。各地要加强技术指导，确保春耕生产顺利进行，为全年粮食丰收奠定基础。</p>
          
          <p>据农业农村部调度，目前全国春播粮食已完成意向面积的10%左右，进度与去年同期持平。南方早稻栽插已过八成，东北地区水稻育秧陆续展开，西南地区春玉米、春大豆开始播种。</p>
          
          <p>气象部门预计，今年春季全国大部地区气温接近常年或偏高，降水总体正常，有利于春耕生产。但部分地区可能出现阶段性低温、春旱或渍涝等灾害性天气，需要提前做好应对准备。</p>
          
          <p>农业农村部要求各地要抓好以下技术措施：</p>
          <ol>
            <li>科学选择良种，因地制宜推广优质、高产、抗逆性强的品种</li>
            <li>加强农资供应保障，确保种子、化肥、农药等农资质量合格、供应充足</li>
            <li>推广绿色生产技术，减少化肥农药使用量，提高资源利用效率</li>
            <li>强化病虫害监测预警，及时发布预警信息，科学指导防控</li>
            <li>做好农机检修和跨区作业组织，提高机械化作业水平</li>
          </ol>
        `,
        image: 'https://www.moa.gov.cn/masvod/public/2025/09/26/20250926_199850f5a36_r31_1200k.mp4',
        author: '种植业管理司',

      {

        summary: '近期农产品价格指数持续上涨，主要受天气因素、供需关系变化等影响。专家建议加强市场调控，保障供应稳定。',
        content: `
          <p>近期农产品价格指数持续上涨，主要受天气因素、供需关系变化等影响。专家建议加强市场调控，保障供应稳定。</p>
          
          <p>据农业农村部监测，3月份"菜篮子"产品批发价格指数为135.69，环比上涨8.25个点，同比上涨12.34个点。重点监测的28种蔬菜平均价格为5.87元/公斤，环比上涨11.2%。</p>
          
          <p>价格上涨的主要原因包括：</p>
          <ul>
            <li>天气因素：部分地区出现倒春寒天气，影响蔬菜生长</li>
            <li>运输成本：油价上涨推高农产品运输成本</li>
            <li>供需关系：节日消费增加，市场需求旺盛</li>
            <li>季节性因素：部分品种进入换茬期，供应量减少</li>
          </ul>
          
          <p>专家建议：</p>
          <ol>
            <li>加强产销衔接，畅通农产品流通渠道</li>
            <li>做好储备调节，适时投放储备蔬菜</li>
            <li>强化市场监管，严厉打击囤积居奇等违法行为</li>
            <li>引导合理预期，稳定市场信心</li>
          </ol>
        `,

      {

        summary: '随着5G、物联网、人工智能等新一代信息技术在农业领域的广泛应用，智慧农业正成为推动乡村振兴的重要力量。',
        content: `
          <p>随着5G、物联网、人工智能等新一代信息技术在农业领域的广泛应用，智慧农业正成为推动乡村振兴的重要力量。</p>
          
          <p>近日，农业农村部发布《"十四五"全国智慧农业发展规划》，明确提出到2025年，智慧农业发展水平要超过15%，农业生产信息化率达到30%以上。</p>

          <p>专家指出，智慧农业的发展将带来以下变革：</p>
          <ol>
            <li>提高农业生产效率，降低劳动强度</li>
            <li>实现精准施肥、精准灌溉，减少资源浪费</li>
            <li>提升农产品质量，增强市场竞争力</li>
            <li>促进农业产业链升级，增加农民收入</li>

          <p>未来，随着更多先进技术在农业领域的落地应用，智慧农业将为我国农业现代化和乡村振兴注入强劲动力。</p>
        `,

        title: '农村电商蓬勃发展，农产品上行渠道不断拓宽',

    // 当前显示的资讯详情
    let currentDetail = null;
    
    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 绑定搜索框事件
      document.querySelector('.search-box button').addEventListener('click', function() {
        const keyword = document.querySelector('.search-box input').value.trim();
        if (keyword) {
          searchNews(keyword);
        } else {
          renderNewsItems(newsData);
        }
      });
      
      // 绑定回车搜索
      document.querySelector('.search-box input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          document.querySelector('.search-box button').click();
        }
      });
      
      // 加载资讯列表
      setTimeout(() => {
        renderNewsItems(newsData);
      }, 1000);
    });
    
    // 渲染资讯列表
    function renderNewsItems(data) {
      const container = document.getElementById('newsGrid');
      
      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-newspaper"></i>
            <h3>暂无相关资讯</h3>
            <p>没有找到匹配的资讯内容</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = data.map(news => {
        // 检查是否有图片链接
        let mediaElement = '';
        if (news.image) {
          // 检查链接是否为视频
          const isVideo = news.image.endsWith && news.image.endsWith('.mp4');
          mediaElement = isVideo ? 
            `<video src="${news.image}" class="news-image" controls></video>` :
            `<img src="${news.image}" alt="${news.title}" class="news-image">`;
        }
          
        return `
          <div class="news-item" onclick="showNewsDetail(${news.id})">
            ${mediaElement}
            <div class="news-content">
              <span class="news-category">${news.category}</span>
              <h3 class="news-title">${news.title}</h3>
              <p class="news-summary">${news.summary}</p>
              <div class="news-meta">
                <span>${news.author}</span>
                <span>${news.time}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 显示资讯详情
    function showNewsDetail(id) {
      const news = newsData.find(n => n.id === id);
      if (!news) return;
      
      currentDetail = news;
      
      // 检查是否有图片链接
      let mediaElement = '';
      if (news.image) {
        // 检查链接是否为视频
        const isVideo = news.image.endsWith && news.image.endsWith('.mp4');
        mediaElement = isVideo ?
          `<video src="${news.image}" alt="${news.title}" class="detail-image" controls></video>` :
          `<img src="${news.image}" alt="${news.title}" class="detail-image">`;
      }
      
      const mainContainer = document.querySelector('.news-main');
      mainContainer.innerHTML = `
        <button class="back-btn" onclick="backToList()">
          <i class="fas fa-arrow-left"></i> 返回资讯列表
        </button>
        <div class="news-detail">
          <div class="detail-header">
            <h2>${news.title}</h2>
            <div class="detail-meta">
              <span><i class="fas fa-folder"></i> ${news.category}</span>
              <span><i class="fas fa-user"></i> ${news.author}</span>
              <span><i class="fas fa-clock"></i> ${news.time}</span>
              <span><i class="fas fa-eye"></i> ${news.views} 阅读</span>
            </div>
          </div>
          ${mediaElement}
          <div class="detail-content">
            ${news.content}
          </div>
        </div>
      `;
    }
    
    // 返回资讯列表
    function backToList() {
      const mainContainer = document.querySelector('.news-main');
      mainContainer.innerHTML = '<div class="news-grid" id="newsGrid"><div class="loading"><i class="fas fa-spinner"></i><p>正在加载资讯...</p></div></div>';
      
      setTimeout(() => {
        renderNewsItems(newsData);
      }, 500);
    }
    
    // 搜索资讯
    function searchNews(keyword) {
      const filteredData = newsData.filter(news => 
        news.title.includes(keyword) || 
        news.category.includes(keyword) || 
        news.summary.includes(keyword) ||
        news.content.includes(keyword)
      );
      renderNewsItems(filteredData);
    }
  </script>
