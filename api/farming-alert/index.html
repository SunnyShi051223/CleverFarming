<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农时预警 - 智禾慧农</title>
  <style>
    :root {
      --primary-green: #2e7d32;
      --secondary-green: #4caf50;
      --accent-green: #a5d6a7;
      --light-bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-dark: #333;
      --text-light: #666;
      --border-color: #e0e0e0;
      --shadow: 0 4px 6px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: url("BG.jpg");
      background-size: cover;
      font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
      color: white;
      padding: 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    .header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
    }
    .header h1 i {
      margin-right: 12px;
    }
    .back-home-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }
    .back-home-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .module-title {
      color: var(--primary-green);
      margin-bottom: 20px;
      font-size: 1.8rem;
      border-bottom: 2px solid var(--accent-green);
      padding-bottom: 10px;
    }
    .module-description {
      color: var(--text-light);
      margin-bottom: 25px;
      font-size: 1.1rem;
    }
    
    .alert-container {
      background-color: var(--card-bg);
      padding: 35px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      min-height: 500px;
    }
    
    .alert-filters {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
      background-color: var(--light-bg);
      padding: 20px;
      border-radius: 10px;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .filter-group label {
      font-weight: 600;
      color: var(--text-dark);
    }
    
    .filter-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-dark);
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .filter-btn:hover, .filter-btn.active {
      background: linear-gradient(to right, var(--primary-green), var(--secondary-green));
      color: white;
      border-color: var(--secondary-green);
    }
    
    
    .alert-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }
    
    .alert-item {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    
    .alert-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
    }
    
    .alert-item.weather::before {
      background: linear-gradient(to bottom, #2196f3, #0d47a1);
    }
    
    .alert-item.pest::before {
      background: linear-gradient(to bottom, #f44336, #b71c1c);
    }
    
    .alert-item.farming::before {
      background: linear-gradient(to bottom, #4caf50, #1b5e20);
    }
    
    .alert-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    
    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .alert-type {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .alert-type.weather {
      background-color: #e3f2fd;
      color: #0d47a1;
    }
    
    .alert-type.pest {
      background-color: #ffebee;
      color: #b71c1c;
    }
    
    .alert-type.farming {
      background-color: #e8f5e9;
      color: #1b5e20;
    }
    
    .alert-date {
      color: var(--text-light);
      font-size: 0.9rem;
    }
    
    .alert-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text-dark);
    }
    
    .alert-content {
      color: var(--text-light);
      margin-bottom: 15px;
      line-height: 1.6;
    }
    
    .alert-actions {
      display: flex;
      justify-content: flex-end;
    }
    
    .action-btn {
      padding: 6px 12px;
      background-color: var(--light-bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.9rem;
    }
    
    .action-btn:hover {
      background-color: var(--accent-green);
      color: var(--primary-green);
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .loading i {
      font-size: 2rem;
      margin-bottom: 15px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 已读状态样式 */
    .alert-item.read {
      opacity: 0.6;
      background-color: #fafafa;
    }
    
    .alert-item.read:hover {
      opacity: 0.8;
    }
    
    .read-badge {
      display: inline-block;
      padding: 2px 8px;
      background-color: #9e9e9e;
      color: white;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-left: 8px;
    }
    
    .unread-count {
      background-color: #f44336;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: 15px;
    }
    
    .action-btn.mark-unread {
      background-color: var(--accent-green);
      color: var(--primary-green);
    }
    
    .action-btn.mark-unread:hover {
      background-color: var(--secondary-green);
      color: white;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <i class="fas fa-bell"></i> 智禾慧农 - 农时预警
        <span class="unread-count" id="unreadCount">0</span>
      </h1>
      <a href="/api/farmer.html" class="back-home-btn">
        <i class="fas fa-home"></i> 返回首页
      </a>
    </div>

    <div class="alert-container">
      <h2 class="module-title">农时预警</h2>
      <p class="module-description">实时获取天气预警、病虫害预警和农事提醒</p>
      
      <div class="alert-filters">
        <div class="filter-group">
          <label>预警类型：</label>
          <div class="filter-options">
            <button class="filter-btn active" data-type="all">全部</button>
            <button class="filter-btn" data-type="weather">天气预警</button>
            <button class="filter-btn" data-type="pest">病虫害预警</button>
            <button class="filter-btn" data-type="farming">农事提醒</button>
          </div>
        </div>
        <div class="filter-group">
          <label>阅读状态：</label>
          <div class="filter-options">
            <button class="filter-btn active" data-read="all">全部</button>
            <button class="filter-btn" data-read="unread">未读</button>
            <button class="filter-btn" data-read="read">已读</button>
          </div>
        </div>
      </div>
      
      <div class="alert-list" id="alertList">
        <div class="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载预警信息...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 从localStorage加载已读状态
    let readAlerts = JSON.parse(localStorage.getItem('readAlerts') || '[]');
    
    // 预警数据
    const alertData = [
      {
        id: 1,
        type: 'weather',
        title: '暴雨蓝色预警',
        content: '预计未来24小时内将有大到暴雨，请注意防范可能引发的洪涝灾害，及时疏通排水沟渠。',
        date: '2025-06-15 08:30',
        location: '北京市'
      },
      {
        id: 2,
        type: 'pest',
        title: '稻飞虱虫害预警',
        content: '近期气温适宜，稻飞虱繁殖加快，请及时检查田间虫情，必要时进行药剂防治。',
        date: '2025-06-14 16:45',
        location: '北京市'
      },
      {
        id: 3,
        type: 'farming',
        title: '水稻分蘖期管理提醒',
        content: '当前正值水稻分蘖期，需保持浅水层，适时追施分蘖肥，促进有效分蘖。',
        date: '2025-06-13 09:15',
        location: '北京市'
      },
      {
        id: 4,
        type: 'weather',
        title: '高温橙色预警',
        content: '未来一周将持续高温天气，最高气温可达37℃以上，请注意防暑降温，合理安排农事活动。',
        date: '2025-06-12 14:20',
        location: '北京市'
      },
      {
        id: 5,
        type: 'pest',
        title: '玉米螟虫害预警',
        content: '近期发现玉米螟幼虫活动频繁，请及时检查玉米心叶，发现虫害立即防治。',
        date: '2025-06-11 11:30',
        location: '北京市'
      }
    ];
    
    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 加载预警列表
      setTimeout(() => {
        applyFilters();
        updateUnreadCount();
      }, 1000);
      
      // 绑定筛选按钮事件
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          // 更新活动状态（仅在同一组内）
          const isTypeFilter = this.dataset.type !== undefined;
          const isReadFilter = this.dataset.read !== undefined;
          
          if (isTypeFilter) {
            document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
          } else if (isReadFilter) {
            document.querySelectorAll('.filter-btn[data-read]').forEach(b => b.classList.remove('active'));
          }
          
          this.classList.add('active');
          
          // 重新应用筛选
          applyFilters();
        });
      });
      
    });
    
    // 应用所有筛选条件
    function applyFilters() {
      let filteredData = alertData;
      
      // 类型筛选
      const activeTypeFilter = document.querySelector('.filter-btn[data-type].active');
      if (activeTypeFilter && activeTypeFilter.dataset.type !== 'all') {
        filteredData = filteredData.filter(alert => alert.type === activeTypeFilter.dataset.type);
      }
      
      // 阅读状态筛选
      const activeReadFilter = document.querySelector('.filter-btn[data-read].active');
      if (activeReadFilter) {
        const readStatus = activeReadFilter.dataset.read;
        if (readStatus === 'read') {
          filteredData = filteredData.filter(alert => readAlerts.includes(alert.id));
        } else if (readStatus === 'unread') {
          filteredData = filteredData.filter(alert => !readAlerts.includes(alert.id));
        }
      }
      
      renderAlertList(filteredData);
    }
    
    // 渲染预警列表
    function renderAlertList(data) {
      const alertList = document.getElementById('alertList');
      
      if (!data || data.length === 0) {
        alertList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <h3>暂无预警信息</h3>
            <p>当前没有相关的预警信息</p>
          </div>
        `;
        return;
      }
      
      alertList.innerHTML = data.map(alert => {
        const isRead = readAlerts.includes(alert.id);
        return `
        <div class="alert-item ${alert.type} ${isRead ? 'read' : ''}">
          <div class="alert-header">
            <span class="alert-type ${alert.type}">
              ${alert.type === 'weather' ? '天气预警' : alert.type === 'pest' ? '病虫害预警' : '农事提醒'}
              ${isRead ? '<span class="read-badge">已读</span>' : ''}
            </span>
            <span class="alert-date">${alert.date}</span>
          </div>
          <h3 class="alert-title">${alert.title}</h3>
          <p class="alert-content">${alert.content}</p>
          <div class="alert-actions">
            ${isRead ? 
              `<button class="action-btn mark-unread" onclick="markAsUnread(${alert.id})">
                <i class="fas fa-undo"></i> 标为未读
              </button>` :
              `<button class="action-btn" onclick="markAsRead(${alert.id})">
                <i class="fas fa-check"></i> 标为已读
              </button>`
            }
          </div>
        </div>
      `;
      }).join('');
    }
    
    // 更新未读数量
    function updateUnreadCount() {
      const unreadCount = alertData.length - readAlerts.length;
      document.getElementById('unreadCount').textContent = unreadCount;
    }
    
    // 标为已读
    function markAsRead(id) {
      if (!readAlerts.includes(id)) {
        readAlerts.push(id);
        localStorage.setItem('readAlerts', JSON.stringify(readAlerts));
        applyFilters();
        updateUnreadCount();
      }
    }
    
    // 标为未读
    function markAsUnread(id) {
      const index = readAlerts.indexOf(id);
      if (index > -1) {
        readAlerts.splice(index, 1);
        localStorage.setItem('readAlerts', JSON.stringify(readAlerts));
        applyFilters();
        updateUnreadCount();
      }
    }
  </script>
</body>
</html>
