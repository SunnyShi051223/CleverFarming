<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智禾慧研 - 管理员</title>
  <style>
    :root {
      --primary-green: #2e7d32;
      --secondary-green: #4caf50;
      --accent-green: #a5d6a7;
      --light-bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-dark: #333;
      --text-light: #666;
      --border-color: #e0e0e0;
      --shadow: 0 4px 6px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
      color: white;
      padding: 25px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    .header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
    }
    .header h1 i {
      margin-right: 12px;
    }
    .logout-section {
      display: flex;
      align-items: center;
    }
    .current-user {
      margin-right: 15px;
      font-weight: 600;
    }
    .logout-btn {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
    }
    .logout-btn:hover {
      background-color: #d32f2f;
    }

    .tabs {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 25px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tab-button {
      background-color: var(--card-bg);
      border: 2px solid var(--border-color);
      outline: none;
      cursor: pointer;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      transition: var(--transition);
      border-radius: 12px;
      min-width: 150px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }
    .tab-button i {
      font-size: 1.5rem;
      margin-bottom: 6px;
      color: var(--primary-green);
    }
    .tab-button.active {
      background-color: var(--secondary-green);
      color: white;
      border-color: var(--secondary-green);
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(46, 125, 50, 0.2);
    }
    .tab-button:hover:not(.active) {
      background-color: var(--accent-green);
      border-color: var(--accent-green);
      transform: translateY(-2px);
    }

    .tab-content {
      display: none;
      background-color: var(--card-bg);
      padding: 35px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.5s ease-out;
      min-height: 500px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .active-tab {
      display: block;
    }

    .module-title {
      color: var(--primary-green);
      margin-bottom: 20px;
      font-size: 1.8rem;
      border-bottom: 2px solid var(--accent-green);
      padding-bottom: 10px;
    }
    .module-description {
      color: var(--text-light);
      margin-bottom: 25px;
      font-size: 1.1rem;
    }

    /* 用户管理模块样式 */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, var(--secondary-green), var(--accent-green));
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 1rem;
    }
    .user-table-container {
      overflow-x: auto;
    }
    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .user-table th,
    .user-table td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    .user-table th {
      background-color: var(--accent-green);
      color: var(--primary-green);
      font-weight: 600;
    }
    .user-table tr:hover {
      background-color: #f1f8e9;
    }
    .status-active {
      color: #4caf50;
      font-weight: 600;
    }
    .status-inactive {
      color: #f44336;
      font-weight: 600;
    }
    .action-btn {
      padding: 6px 12px;
      margin: 0 3px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .edit-btn {
      background-color: #2196f3;
      color: white;
    }
    .delete-btn {
      background-color: #f44336;
      color: white;
    }
    .action-btn:hover {
      opacity: 0.85;
    }

    /* 其他模块占位样式 */
    .placeholder-content {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-light);
      font-size: 1.2rem;
    }
    .placeholder-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      color: var(--accent-green);
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-user-shield"></i> 智禾慧研 - 管理中心</h1>
      <div class="logout-section">
        <span class="current-user">管理员: {{ user.username }}</span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-button active" data-tab="users">
        <i class="fas fa-users"></i>
        <span>用户管理</span>
      </button>
      <button class="tab-button" data-tab="system">
        <i class="fas fa-cogs"></i>
        <span>系统配置</span>
      </button>
      <button class="tab-button" data-tab="logs">
        <i class="fas fa-history"></i>
        <span>操作日志</span>
      </button>
    </div>

    <!-- 用户管理模块 -->
    <div id="users" class="tab-content active-tab">
      <h2 class="module-title">用户管理</h2>
      <p class="module-description">查看和管理所有注册用户的信息与状态。</p>

      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-number" id="totalUsers">0</div>
          <div class="stat-label">总用户数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="active24h">0</div>
          <div class="stat-label">活跃用户(24h)</div>
        </div>
        <div class="stat-card" id="adminCountCard">
          <div class="stat-number" id="adminCount">0</div>
          <div class="stat-label">管理员</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="newToday">0</div>
          <div class="stat-label">今日新增</div>
        </div>
      </div>

      <div class="user-table-container">
        <table class="user-table">
          <thead>
            <tr>
              <th>用户ID</th>
              <th>用户名</th>
              <th>注册时间</th>
              <th>最后登录</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- 由JavaScript渲染 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 系统配置模块 -->
    <div id="system" class="tab-content">
      <h2 class="module-title">系统配置</h2>
      <p class="module-description">管理系统的各项参数和设置。</p>
      <div class="placeholder-content">
        <i class="fas fa-cogs placeholder-icon"></i>
        <p>系统配置功能开发中...</p>
      </div>
    </div>

    <!-- 操作日志模块 -->
    <div id="logs" class="tab-content">
      <h2 class="module-title">操作日志</h2>
      <p class="module-description">查看系统操作和用户活动日志。</p>
      <div class="placeholder-content">
        <i class="fas fa-history placeholder-icon"></i>
        <p>操作日志功能开发中...</p>
      </div>
    </div>
  </div>

  <script>
    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化标签页
      initTabs();
      // 获取统计和用户数据
      fetchStats();
      fetchUsers();
    });

    async function fetchStats() {
      try {
        const res = await fetch('/api/admin/stats');
        const result = await res.json();
        if (result.success) {
          const stats = result.stats;
          document.getElementById('totalUsers').textContent = stats.total_users;
          document.getElementById('newToday').textContent = stats.new_today;
          document.getElementById('active24h').textContent = stats.active_24h;
          
          const adminRole = stats.roles.find(r => r.role === 'admin');
          document.getElementById('adminCount').textContent = adminRole ? adminRole.count : 0;
        }
      } catch (e) {
        console.error('Fetch stats failed:', e);
      }
    }

    async function fetchUsers() {
      try {
        const res = await fetch('/api/admin/users');
        const result = await res.json();
        if (result.success) {
          renderUsers(result.users);
        }
      } catch (e) {
        console.error('Fetch users failed:', e);
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = users.map(user => `
        <tr>
          <td>U${String(user.id).padStart(3, '0')}</td>
          <td>${user.username} (${user.role === 'admin' ? '管理员' : '农户'})</td>
          <td>${user.created_at || '-'}</td>
          <td>${user.last_login || '-'}</td>
          <td><span class="status-active">正常</span></td>
          <td>
            <button class="action-btn edit-btn" onclick="editUser(${user.id})"><i class="fas fa-edit"></i> 编辑</button>
            <button class="action-btn delete-btn" onclick="deleteUser(${user.id})"><i class="fas fa-trash"></i> 删除</button>
          </td>
        </tr>
      `).join('');
    }

    async function deleteUser(id) {
      if (!confirm('确定要删除该用户吗？此操作不可逆。')) return;
      try {
        const res = await fetch(`/api/admin/user/${id}`, { method: 'DELETE' });
        const result = await res.json();
        alert(result.message);
        if (result.success) {
          fetchUsers();
          fetchStats();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function editUser(id) {
      alert('用户编辑功能开发中，当前可以修改数据库或待下个版本。');
    }
    
    // 标签页切换逻辑
    function initTabs() {
      const tabButtons = document.querySelectorAll('.tab-button');
      if (!tabButtons.length) return;
      
      tabButtons.forEach(button => {
        button.addEventListener('click', () => {
          const tabName = button.getAttribute('data-tab');
          
          // 更新活动标签
          tabButtons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          
          // 显示对应内容
          document.querySelectorAll('.tab-content').forEach(content => {
            content.style.display = 'none';
          });
          const activeTab = document.getElementById(tabName);
          if (activeTab) activeTab.style.display = 'block';
        });
      });
      
      // 默认显示第一个标签页
      tabButtons[0].click();
    }
    
    // 退出登录
    function logout() {
      window.location.href = '/logout';
    }
    
    // 检查登录状态
    window.onload = function() {
      // 这里不需要额外检查，因为后端中间件已经验证了token
      // 如果未登录或token无效，后端会重定向到登录页
    }
  </script>
</body>
</html>
