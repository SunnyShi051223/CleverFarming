<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农时预警 - 智禾慧农</title>
  <style>
    :root {
      --primary-green: #2e7d32;
      --secondary-green: #4caf50;
      --accent-green: #a5d6a7;
      --light-bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-dark: #333;
      --text-light: #666;
      --border-color: #e0e0e0;
      --shadow: 0 4px 6px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: url("BG.jpg");
      background-size: cover;
      font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
      color: white;
      padding: 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    .header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
    }
    .header h1 i {
      margin-right: 12px;
    }
    .back-home-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }
    .back-home-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .module-title {
      color: var(--primary-green);
      margin-bottom: 20px;
      font-size: 1.8rem;
      border-bottom: 2px solid var(--accent-green);
      padding-bottom: 10px;
    }
    .module-description {
      color: var(--text-light);
      margin-bottom: 25px;
      font-size: 1.1rem;
    }
    
    .alert-container {
      background-color: var(--card-bg);
      padding: 35px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      min-height: 500px;
    }
    
    .alert-filters {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
      background-color: var(--light-bg);
      padding: 20px;
      border-radius: 10px;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .filter-group label {
      font-weight: 600;
      color: var(--text-dark);
    }
    
    .filter-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-dark);
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .filter-btn:hover, .filter-btn.active {
      background: linear-gradient(to right, var(--primary-green), var(--secondary-green));
      color: white;
      border-color: var(--secondary-green);
    }
    
    
    .alert-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }
    
    .alert-item {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    
    .alert-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
    }
    
    .alert-item.alert::before {
      background: linear-gradient(to bottom, #f44336, #b71c1c);
    }
    
    .alert-item.news::before {
      background: linear-gradient(to bottom, #ff9800, #f57c00);
    }
    
    .alert-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    
    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .alert-type {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .alert-type.alert {
      background-color: #ffebee;
      color: #b71c1c;
    }
    
    .alert-type.news {
      background-color: #fff3e0;
      color: #e65100;
    }
    
    .alert-date {
      color: var(--text-light);
      font-size: 0.9rem;
    }
    
    .alert-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text-dark);
    }
    
    .alert-content {
      color: var(--text-light);
      margin-bottom: 15px;
      line-height: 1.6;
    }
    
    .alert-actions {
      display: flex;
      justify-content: flex-end;
    }
    
    .action-btn {
      padding: 6px 12px;
      background-color: var(--light-bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.9rem;
    }
    
    .action-btn:hover {
      background-color: var(--accent-green);
      color: var(--primary-green);
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .loading i {
      font-size: 2rem;
      margin-bottom: 15px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 已读状态样式 */
    .alert-item.read {
      opacity: 0.6;
      background-color: #fafafa;
    }
    
    .alert-item.read:hover {
      opacity: 0.8;
    }
    
    .read-badge {
      display: inline-block;
      padding: 2px 8px;
      background-color: #9e9e9e;
      color: white;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-left: 8px;
    }
    
    .unread-count {
      background-color: #f44336;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: 15px;
    }
    
    .action-btn.mark-unread {
      background-color: var(--accent-green);
      color: var(--primary-green);
    }
    
    .action-btn.mark-unread:hover {
      background-color: var(--secondary-green);
      color: white;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <i class="fas fa-bell"></i> 智禾慧农 - 消息推送
        <span class="unread-count" id="unreadCount">0</span>
      </h1>
      <a href="/api/farmer.html" class="back-home-btn">
        <i class="fas fa-home"></i> 返回首页
      </a>
    </div>

    <div class="alert-container">
      <h2 class="module-title">农时预警</h2>
      <p class="module-description">实时获取农业气象、土壤墒情、病虫害预警，保障农业生产安全</p>
      
      <div class="alert-filters">
        <div class="filter-group">
          <label>细分类型：</label>
          <div class="filter-options">
            <button class="filter-btn active" data-subtype="all">全部</button>
            <button class="filter-btn" data-subtype="nyqx">农业气象</button>
            <button class="filter-btn" data-subtype="trsq">土壤墒情</button>
            <button class="filter-btn" data-subtype="zwbch">植物病虫害</button>
          </div>
        </div>
        <div class="filter-group">
          <label>阅读状态：</label>
          <div class="filter-options">
            <button class="filter-btn active" data-read="all">全部</button>
            <button class="filter-btn" data-read="unread">未读</button>
            <button class="filter-btn" data-read="read">已读</button>
          </div>
        </div>
      </div>
      
      <div class="alert-list" id="alertList">
        <div class="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载信息...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 从localStorage加载已读状态
    let readAlerts = JSON.parse(localStorage.getItem('readAlerts') || '[]');
    
    // 预警数据
    let alertData = [];
    
    // 从服务器获取预警数据
    async function fetchAlerts() {
      try {
        // 构建查询参数
        const activeSubtypeFilter = document.querySelector('.filter-btn[data-subtype].active');
        const subtype = activeSubtypeFilter ? activeSubtypeFilter.dataset.subtype : 'all';
        
        let url = '/api/alert/list?';
        if (subtype !== 'all') url += `subtype=${subtype}&`;
        
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.code === 200) {
          alertData = result.data;
          
          // 同步数据库中的已读状态到本地
          let updated = false;
          alertData.forEach(alert => {
            if (alert.is_read && !readAlerts.includes(alert.id)) {
              readAlerts.push(alert.id);
              updated = true;
            }
          });
          
          if (updated) {
            localStorage.setItem('readAlerts', JSON.stringify(readAlerts));
          }
          
          applyFilters();
          updateUnreadCount();
        } else {
          console.error('获取信息失败:', result.message);
          renderAlertList([]);
        }
      } catch (error) {
        console.error('获取信息出错:', error);
        renderAlertList([]);
      }
    }
    
    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 加载列表
      fetchAlerts();
      
      // 绑定筛选按钮事件
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          // 更新活动状态（仅在同一组内）
          const isSubtypeFilter = this.dataset.subtype !== undefined;
          const isReadFilter = this.dataset.read !== undefined;
          
          if (isSubtypeFilter) {
            document.querySelectorAll('.filter-btn[data-subtype]').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            fetchAlerts();
          } else if (isReadFilter) {
            document.querySelectorAll('.filter-btn[data-read]').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            applyFilters();
          }
        });
      });
      
    });
    
    // 应用本地筛选条件（主要是阅读状态）
    function applyFilters() {
      let filteredData = alertData;
      
      // 阅读状态筛选
      const activeReadFilter = document.querySelector('.filter-btn[data-read].active');
      if (activeReadFilter) {
        const readStatus = activeReadFilter.dataset.read;
        if (readStatus === 'read') {
          filteredData = filteredData.filter(alert => readAlerts.includes(alert.id));
        } else if (readStatus === 'unread') {
          filteredData = filteredData.filter(alert => !readAlerts.includes(alert.id));
        }
      }
      
      renderAlertList(filteredData);
    }
    
    // 渲染列表
    function renderAlertList(data) {
      const alertList = document.getElementById('alertList');
      
      if (!data || data.length === 0) {
        alertList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <h3>暂无信息</h3>
            <p>当前没有相关的信息内容</p>
          </div>
        `;
        return;
      }
      
      alertList.innerHTML = data.map(alert => {
        const isRead = readAlerts.includes(alert.id);
        const typeLabel = alert.alert_type === 'news' ? '农情速递' : '农时预警';
        const subtypeLabel = alert.subtype_name || alert.alert_subtype;
        
        // 生成详情页URL
        const url = `detail.html?id=${alert.id}`;
        return `
        <div class="alert-item ${alert.alert_type} ${isRead ? 'read' : ''}" onclick="window.location.href='${url}'" style="cursor: pointer;">
          <div class="alert-header">
            <span class="alert-type ${alert.alert_type}">
              ${typeLabel} · ${subtypeLabel}
              ${isRead ? '<span class="read-badge">已读</span>' : ''}
            </span>
            <span class="alert-date">${alert.created_at}</span>
          </div>
          <h3 class="alert-title">${alert.title}</h3>
          <p class="alert-content">${alert.content.substring(0, 100)}${alert.content.length > 100 ? '...' : ''}</p>
          <div class="alert-actions">
            ${isRead ? 
              `<button class="action-btn mark-unread" onclick="event.stopPropagation(); markAsUnread(${alert.id})"><i class="fas fa-undo"></i> 标为未读</button>` :
              `<button class="action-btn" onclick="event.stopPropagation(); markAsRead(${alert.id})"><i class="fas fa-check"></i> 标为已读</button>`
            }
          </div>
        </div>
      `;
      }).join('');
    }
    
    // 更新未读数量
    function updateUnreadCount() {
      const unreadCount = alertData.length - readAlerts.length;
      document.getElementById('unreadCount').textContent = unreadCount;
    }
    
    // 标为已读
    async function markAsRead(id) {
      if (!readAlerts.includes(id)) {
        try {
          // 这里可以添加标记已读的API调用
          // 目前我们的API还没有实现标记已读功能，可以后续添加
          readAlerts.push(id);
          localStorage.setItem('readAlerts', JSON.stringify(readAlerts));
          applyFilters();
          updateUnreadCount();
        } catch (error) {
          console.error('标记已读失败:', error);
        }
      }
    }
    
    // 标为未读
    function markAsUnread(id) {
      const index = readAlerts.indexOf(id);
      if (index > -1) {
        readAlerts.splice(index, 1);
        localStorage.setItem('readAlerts', JSON.stringify(readAlerts));
        applyFilters();
        updateUnreadCount();
      }
    }
  </script>
</body>
</html>
